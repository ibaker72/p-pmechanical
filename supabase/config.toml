# Supabase local development config.
#
# This file is consumed by `supabase start` / `supabase db reset` when you
# run the stack locally. For remote (production) projects you only need the
# `migrations/` folder — link with `supabase link --project-ref <ref>` and
# apply with `supabase db push`.

project_id = "pp-mechanical"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
enabled = false
